services:
  - type: web
    name: omix-sms
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma generate --schema=prisma/local-schema.prisma && npm run next-build
    startCommand: npx prisma db push && npm run db:seed && npm start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://omix-h2.onrender.com
      - key: DATABASE_URL
        value: postgresql://omix_app.dsaajdwjihxnrjzpfhse:OmixDB2026%21@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
      - key: DIRECT_URL
        value: postgresql://omix_app.dsaajdwjihxnrjzpfhse:OmixDB2026%21@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
      - key: SQLITE_URL
        value: file:/tmp/dev.db
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: OPENCODE_ZEN_API_KEY
        sync: false
