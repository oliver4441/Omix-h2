services:
  - type: web
    name: omix-sms
    env: node
    plan: free
    buildCommand: ./node_modules/.bin/prisma generate && ./node_modules/.bin/prisma generate --schema=prisma/local-schema.prisma && ./node_modules/.bin/next build
    startCommand: ./node_modules/.bin/prisma db push && ./node_modules/.bin/next start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://${RENDER_EXTERNAL_HOSTNAME}
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1024"
      - key: OPENROUTER_API_KEY
        sync: false
