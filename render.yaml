services:
  - type: web
    name: omix-sms
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma generate --schema=prisma/local-schema.prisma && npm run next-build
    startCommand: npx prisma db push && npm start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://${RENDER_EXTERNAL_HOSTNAME}
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: OPENROUTER_API_KEY
        sync: false
